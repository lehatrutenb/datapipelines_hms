apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-jvm-gc
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  jvm-gc.json: |
    {
      "id": null,
      "uid": "spark-jvm-gc",
      "title": "Spark JVM GC Time",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "15s",
      "time": {"from": "now-30m", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "GC Time Rate by Type (s GC / s wall)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {"lineWidth": 2, "fillOpacity": 10},
              "color": {"mode": "palette-classic"}
            },
            "overrides": []
          },
          "options": {
            "tooltip": {"mode": "multi", "sort": "none"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "rate(jvm_gc_collection_seconds_sum{job=\"spark-executors\"}[2m])",
              "legendFormat": "{{pod}} {{gc}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "GC Event Rate (events/s)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {"lineWidth": 1, "fillOpacity": 10},
              "color": {"mode": "palette-classic"}
            },
            "overrides": []
          },
          "options": {
            "tooltip": {"mode": "multi", "sort": "none"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "rate(jvm_gc_collection_seconds_count{job=\"spark-executors\"}[2m])",
              "legendFormat": "{{pod}} {{gc}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Cumulative GC Count (by type)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {"lineWidth": 1, "fillOpacity": 10},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 50}
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": {"mode": "multi", "sort": "none"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "jvm_gc_collection_seconds_count{job=\"spark-executors\"}",
              "legendFormat": "{{pod}} {{gc}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Total GC % of Wall Clock",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 16},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "custom": {"lineWidth": 1, "fillOpacity": 20},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 10},
                  {"color": "red", "value": 25}
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": {"mode": "multi", "sort": "none"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(rate(jvm_gc_collection_seconds_sum{job=\"spark-executors\"}[2m])) by (pod) * 100",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        }
      ]
    }
