apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-jobs-health
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  jobs-health.json: |
    {
      "id": null,
      "uid": "spark-jobs-health",
      "title": "Spark Jobs Health",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "15s",
      "time": {"from": "now-30m", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "Active Jobs",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 3}
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(spark_driver_dagscheduler_job_activejobs{job=\"spark-drivers\"})",
              "legendFormat": "active jobs",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "All Jobs (cumulative)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "blue", "value": null}]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(spark_driver_dagscheduler_job_alljobs{job=\"spark-drivers\"})",
              "legendFormat": "all jobs",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Failed Stages (last 2m)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(max_over_time(spark_driver_dagscheduler_stage_failedstages{job=\"spark-drivers\"}[2m]))",
              "legendFormat": "failed stages",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Running Stages",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(spark_driver_dagscheduler_stage_runningstages{job=\"spark-drivers\"})",
              "legendFormat": "running stages",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "Failed Stages (max in 1m window, per app)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 24},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {"lineWidth": 2, "fillOpacity": 20},
              "color": {"mode": "palette-classic"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": {"mode": "multi", "sort": "none"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "max_over_time(spark_driver_dagscheduler_stage_failedstages{job=\"spark-drivers\"}[1m])",
              "legendFormat": "{{app_id}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "title": "Failed Task Attempts (cumulative)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 12, "x": 0, "y": 12},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 100},
                  {"color": "red", "value": 1000}
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(spark_executor_threadpool_completetasks{job=\"spark-executors\"} - spark_executor_succeededtasks{job=\"spark-executors\"}) by (app_id)",
              "legendFormat": "{{app_id}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "title": "Task Failure % (overall)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 12, "x": 12, "y": 12},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 10},
                  {"color": "red", "value": 50}
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum by (app_id) (spark_executor_threadpool_completetasks{job=\"spark-executors\"} - spark_executor_succeededtasks{job=\"spark-executors\"}) / sum by (app_id) (spark_executor_threadpool_completetasks{job=\"spark-executors\"}) * 100",
              "legendFormat": "{{app_id}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 9,
          "title": "Task Failure % over Time (per executor)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 16},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": {"lineWidth": 2, "fillOpacity": 10},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 10},
                  {"color": "red", "value": 50}
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": {"mode": "multi", "sort": "none"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "(rate(spark_executor_threadpool_completetasks{job=\"spark-executors\"}[2m]) - rate(spark_executor_succeededtasks{job=\"spark-executors\"}[2m])) / rate(spark_executor_threadpool_completetasks{job=\"spark-executors\"}[2m]) * 100",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "Task Churn Rate (started - succeeded, per executor)",
          "description": "Non-zero means task retries are happening. High values indicate many task failures. Spark does not expose a direct failedTasks counter; this is the best available proxy.",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 24},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {"lineWidth": 1, "fillOpacity": 10},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.1},
                  {"color": "red", "value": 1}
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": {"mode": "multi", "sort": "none"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "rate(spark_executor_threadpool_completetasks{job=\"spark-executors\"}[2m]) - rate(spark_executor_succeededtasks{job=\"spark-executors\"}[2m])",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        }
      ]
    }
