apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules.yaml

    scrape_configs:
      - job_name: spark-executors
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [spark]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_spark_role]
            action: keep
            regex: executor
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:8090
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_namespace]
            target_label: namespace

      - job_name: spark-drivers
        scrape_interval: 5s
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [spark]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_spark_role]
            action: keep
            regex: driver
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:8090
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

      - job_name: prometheus
        static_configs:
          - targets: [localhost:9090]

  rules.yaml: |
    groups:
      - name: spark
        rules:
          - alert: SparkHighStageFailureRate
            expr: deriv(spark_driver_dagscheduler_stage_failedstages{job="spark-drivers"}[5m]) > 0.1
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: High stage failure rate in app {{ $labels.app_id }}

          - alert: SparkHighGCTime
            expr: sum(rate(jvm_gc_collection_seconds_sum{job="spark-executors"}[2m])) by (pod) * 100 > 25
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: GC consuming {{ $value | humanize }}% of wall clock on {{ $labels.pod }}

          - alert: SparkHighTaskChurnRate
            expr: >
              (
                rate(spark_executor_threadpool_completetasks{job="spark-executors"}[2m])
                - rate(spark_executor_succeededtasks{job="spark-executors"}[2m])
              ) / rate(spark_executor_threadpool_completetasks{job="spark-executors"}[2m]) * 100 > 50
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: >
                {{ $value | humanize }}% of task attempts failing on {{ $labels.pod }} (app {{ $labels.app_id }})
