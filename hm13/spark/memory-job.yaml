apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: memory-job
  namespace: spark
spec:
  type: Python
  mode: cluster
  image: apache/spark:3.5.0-python3
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///opt/spark/scripts/memory_job.py
  sparkVersion: "3.5.0"
  sparkConf:
    spark.metrics.conf.*.source.jvm.class: org.apache.spark.metrics.source.JvmSource
    spark.sql.shuffle.partitions: "8"
    spark.memory.fraction: "0.6"
    spark.memory.storageFraction: "0.9"
  restartPolicy:
    type: Always
    onFailureRetries: 999
    onFailureRetryInterval: 5
    onSubmissionFailureRetries: 5
    onSubmissionFailureRetryInterval: 20
  monitoring:
    exposeDriverMetrics: true
    exposeExecutorMetrics: true
    prometheus:
      jmxExporterJar: /opt/jmx/jmx_prometheus_javaagent-0.20.0.jar
      port: 8090
      configFile: /etc/jmx/jmx_config.yaml
  volumes:
    - name: jmx-agent
      emptyDir: {}
    - name: jmx-config
      configMap:
        name: spark-scripts-memory
        items:
          - key: jmx_config.yaml
            path: jmx_config.yaml
    - name: scripts
      configMap:
        name: spark-scripts-memory
  driver:
    cores: 1
    memory: 512m
    serviceAccount: spark-operator-spark
    initContainers:
      - name: dl-jmx
        image: busybox:1.36
        command:
          - sh
          - -c
          - wget -qO /opt/jmx/jmx_prometheus_javaagent-0.20.0.jar https://repo1.maven.org/maven2/io/prometheus/jmx/jmx_prometheus_javaagent/0.20.0/jmx_prometheus_javaagent-0.20.0.jar
        volumeMounts:
          - name: jmx-agent
            mountPath: /opt/jmx
    volumeMounts:
      - name: jmx-agent
        mountPath: /opt/jmx
      - name: jmx-config
        mountPath: /etc/jmx
      - name: scripts
        mountPath: /opt/spark/scripts
  executor:
    cores: 1
    instances: 2
    memory: 768m
    memoryOverhead: 384m
    initContainers:
      - name: dl-jmx
        image: busybox:1.36
        command:
          - sh
          - -c
          - wget -qO /opt/jmx/jmx_prometheus_javaagent-0.20.0.jar https://repo1.maven.org/maven2/io/prometheus/jmx/jmx_prometheus_javaagent/0.20.0/jmx_prometheus_javaagent-0.20.0.jar
        volumeMounts:
          - name: jmx-agent
            mountPath: /opt/jmx
    volumeMounts:
      - name: jmx-agent
        mountPath: /opt/jmx
      - name: jmx-config
        mountPath: /etc/jmx
