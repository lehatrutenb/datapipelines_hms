apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-scripts-unstable
  namespace: spark
data:
  jmx_config.yaml: |
    lowercaseOutputName: true
    attrNameSnakeCase: true
    rules:
      - pattern: 'metrics<name=(\S+)\.(\S+)\.(\S+)\.executor\.(.+), type=gauges><>Value'
        name: spark_executor_$4
        type: GAUGE
        labels:
          app_namespace: "$1"
          app_id: "$2"
          executor_id: "$3"
      - pattern: 'metrics<name=(\S+)\.(\S+)\.(\S+)\.executor\.(.+), type=counters><>Count'
        name: spark_executor_$4
        type: COUNTER
        labels:
          app_namespace: "$1"
          app_id: "$2"
          executor_id: "$3"
      - pattern: 'metrics<name=(\S+)\.(\S+)\.([0-9]+)\.jvm\.(.+), type=gauges><>Value'
        name: spark_executor_jvm_$4
        type: GAUGE
        labels:
          app_namespace: "$1"
          app_id: "$2"
          executor_id: "$3"
      - pattern: 'metrics<name=(\S+)\.(\S+)\.driver\.DAGScheduler\.(stage|job)\.(.+), type=gauges><>Value'
        name: spark_driver_dagscheduler_$3_$4
        type: GAUGE
        labels:
          app_namespace: "$1"
          app_id: "$2"
      - pattern: 'metrics<name=(\S+)\.(\S+)\.driver\.DAGScheduler\.(.+), type=timers><>Count'
        name: spark_driver_dagscheduler_$3_count
        type: COUNTER
        labels:
          app_namespace: "$1"
          app_id: "$2"
      - pattern: 'metrics<name=(\S+)\.(\S+)\.driver\.jvm\.(.+), type=gauges><>Value'
        name: spark_driver_jvm_$3
        type: GAUGE
        labels:
          app_namespace: "$1"
          app_id: "$2"

  unstable_job.py: |
    from pyspark.sql import SparkSession
    import random
    import time


    def maybe_fail(iterator):
        if random.random() < 0.33:
            raise Exception("simulated failure")
        return iterator


    spark = (
        SparkSession.builder.appName("unstable-job")
        .config("spark.task.maxFailures", "4")
        .getOrCreate()
    )
    sc = spark.sparkContext
    sc.setLogLevel("WARN")

    cycle = 0
    while True:
        try:
            rdd = sc.parallelize(range(500), 4)
            rdd.mapPartitions(maybe_fail).count()
            rdd.mapPartitions(maybe_fail).map(lambda x: (x % 10, x)).reduceByKey(lambda a, b: a + b).count()
            rdd.mapPartitions(maybe_fail).filter(lambda x: x > 0).count()
        except Exception:
            pass
        cycle += 1
        time.sleep(10)
