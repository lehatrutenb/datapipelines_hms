version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    networks:
      - starrocks-net
    volumes:
      - ./minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  hive-metastore:
    image: bitsondatadev/hive-metastore:latest
    container_name: hive-metastore
    ports:
      - "9083:9083"
    environment:
      METASTORE_DB_TYPE: postgres
      DATABASE_HOST: postgres
      DATABASE_NAME: metastore
      DATABASE_USER: hive
      DATABASE_PASSWORD: hivepassword
    networks:
      - starrocks-net
    depends_on:
      - postgres
      - minio

  postgres:
    image: postgres:15
    container_name: metastore-db
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hivepassword
    ports:
      - "5432:5432"
    networks:
      - starrocks-net
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  minio-mc:
    image: minio/mc:latest
    container_name: minio-mc
    depends_on:
      - minio
    networks:
      - starrocks-net
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/raw --ignore-existing;
      mc mb local/iceberg --ignore-existing;
      exit 0;
      "

  notebook-python:
    build:
      context: .
    container_name: notebook-python
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
    ports:
      - "8888:8888" # ?
      - "4040:4040" # ?
    networks:
      - starrocks-net
    volumes:
      - ../hm9:/workspace
  
  starrocks-fe:
    image: starrocks/fe-ubuntu:4.0.0
    container_name: starrocks-fe
    ports:
      - "8030:8030"   # Web UI
      - "9020:9020"   # Thrift
      - "9030:9030"   # MySQL protocol
    volumes:
      - ./starrocks-fe-config:/opt/starrocks/fe/conf
    environment:
      - LOG_CONSOLE=1
    command: /opt/starrocks/fe/bin/start_fe.sh
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - starrocks-net
    deploy:
      resources:
        limits:
          cpus: '1.5'
        reservations:
          cpus: '1.5' 
  
  starrocks-cn:
    image: starrocks/cn-ubuntu:4.0.0
    container_name: starrocks-cn
    ports:
      - "8040:8040"   # Web UI
      - "9050:9050"   # Heartbeat
      - "9060:9060"   # Thrift
    volumes:
      - ./starrocks-cn-config:/opt/starrocks/cn/conf
    environment:
      - LOG_CONSOLE=1
    command: /opt/starrocks/cn/bin/start_cn.sh
    networks:
      starrocks-net:
        ipv4_address: 172.25.0.10
    deploy:
      resources:
        limits:
          cpus: '4.5'
        reservations:
          cpus: '4.5' 

networks:
  starrocks-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
          gateway: 172.25.0.1
